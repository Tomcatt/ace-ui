<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RezStation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --accent: #00e5ff;
      --accent-hover: #00b8d4;
      --text: #f0f0f0;
      --text-muted: #888;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: grid;
      grid-template-rows: 1fr 90px;
      grid-template-columns: 320px 1fr;
      grid-template-areas:
        "create library"
        "player player";
      overflow: hidden;
    }

    #create-panel {
      grid-area: create;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 16px;
      overflow-y: auto;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-shadow: 0 0 8px #00e5ff, 0 0 20px rgba(0,229,255,0.5);
    }

    .mode-toggle {
      display: flex;
      background: var(--surface2);
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
    }

    .mode-toggle button {
      flex: 1;
      padding: 7px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.15s;
    }

    .mode-toggle button.active {
      background: var(--accent);
      color: #fff;
    }

    #simple-form, #custom-form { display: flex; flex-direction: column; gap: 12px; }
    #custom-form { display: none; }

    label { font-size: 0.78rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

    textarea, input[type="text"], input[type="number"], select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 12px;
      font-size: 0.9rem;
      font-family: inherit;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea:focus, input:focus, select:focus { border-color: var(--accent); }

    .field { display: flex; flex-direction: column; gap: 5px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: var(--surface2);
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .toggle-row span { font-size: 0.9rem; }

    .switch { position: relative; width: 40px; height: 22px; }
    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 22px;
      cursor: pointer;
      transition: 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; top: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
    }

    input:checked + .slider { background: var(--accent); }
    input:checked + .slider::before { transform: translateX(18px); }

    .duration-row { display: flex; flex-direction: column; gap: 5px; }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      padding: 0;
      border: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    .duration-label { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--text-muted); }

    .btn-generate {
      padding: 13px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      margin-top: auto;
    }

    .btn-generate:hover { background: var(--accent-hover); }
    .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }

    #library-panel {
      grid-area: library;
      background: var(--bg);
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .library-header-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }
    .library-header { font-size: 1rem; font-weight: 600; color: var(--text-muted); flex: 1; }
    #selection-count { font-size: 0.82rem; color: var(--accent); white-space: nowrap; }

    /* Custom checkbox */
    .track-checkbox {
      appearance: none;
      -webkit-appearance: none;
      width: 17px; height: 17px;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: border-color 0.15s, background 0.15s;
    }
    .track-checkbox:hover { border-color: var(--accent); }
    .track-checkbox:checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .track-checkbox:checked::after {
      content: '✓';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      color: white;
      line-height: 17px;
      text-align: center;
    }
    .track-checkbox:indeterminate {
      border-color: var(--accent);
      background: rgba(108,99,255,0.3);
    }

    .track-card.selected { border-color: var(--accent); background: rgba(108,99,255,0.06); }

    .btn-mass-menu {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 7px;
      width: 30px; height: 30px;
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .btn-mass-menu:hover { color: var(--text); border-color: var(--accent); background: rgba(108,99,255,0.12); }
    .mass-menu-sep { height: 1px; background: var(--border); margin: 3px 0; }

    .track-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .track-card:hover { border-color: var(--accent); background: var(--surface2); }
    .track-card.active { border-color: var(--accent); }
    .track-card.generating { opacity: 0.6; cursor: default; }

    .play-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .play-btn:hover { background: var(--accent-hover); }

    .track-info { flex: 1; min-width: 0; }
    .track-title { font-size: 0.9rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-meta { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }

    .track-duration { font-size: 0.82rem; color: var(--text-muted); flex-shrink: 0; }

    .btn-menu {
      background: none;
      border: none;
      color: var(--text-muted);
      border-radius: 6px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }
    .btn-menu:hover { background: rgba(255,255,255,0.08); color: var(--text); }

    .track-menu {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      padding: 4px;
      min-width: 160px;
      z-index: 1000;
    }
    .track-menu button {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      color: var(--text);
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 0.88rem;
    }
    .track-menu button:hover { background: rgba(255,255,255,0.08); }
    .track-menu button.danger { color: #ff6b6b; }
    .track-menu button.danger:hover { background: rgba(255,107,107,0.12); }

    .tip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 15px; height: 15px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      color: var(--text-muted);
      font-size: 0.7rem;
      font-style: normal;
      font-weight: 500;
      cursor: help;
      margin-left: 6px;
      position: relative;
      vertical-align: middle;
    }
    .tip:hover { background: var(--accent); color: #fff; }
    .tip::after {
      content: attr(data-tip);
      position: absolute;
      top: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 8px 11px;
      border-radius: 6px;
      font-size: 0.76rem;
      font-weight: 400;
      color: var(--text);
      width: 240px;
      white-space: normal;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      z-index: 100;
      box-shadow: 0 6px 18px rgba(0,0,0,0.5);
      text-align: left;
      line-height: 1.45;
    }
    .tip:hover::after { opacity: 1; }
    .tip.wide::after { width: 300px; }

    #player-bar {
      grid-area: player;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 24px;
    }

    #player-play {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #player-play:hover { background: var(--accent-hover); }

    #player-title {
      font-size: 0.85rem;
      font-weight: 500;
      min-width: 160px;
      max-width: 220px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #waveform { flex: 1; height: 48px; }

    #player-time { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Status banner ── */
    #status-banner {
      display: none;
      grid-area: create;
      position: absolute;
      top: 0; left: 0; right: 0;
      background: #2a2000;
      border-bottom: 1px solid #554400;
      color: #ffcc44;
      font-size: 0.8rem;
      padding: 8px 14px;
      z-index: 10;
      align-items: center;
      gap: 8px;
    }

    #status-banner.visible { display: flex; }

    /* ── Trash / recovered ── */
    .trash-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    .trash-divider::before, .trash-divider::after {
      content: '';
      flex: 1;
      border-top: 1px solid var(--border);
    }
    .btn-empty-trash {
      background: none;
      border: 1px solid #ff6b6b44;
      color: #ff6b6b;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-empty-trash:hover { background: rgba(255,107,107,0.12); }
    .badge-recovered {
      font-size: 0.7rem;
      background: rgba(255,200,60,0.15);
      color: #ffcc44;
      border: 1px solid rgba(255,200,60,0.25);
      border-radius: 4px;
      padding: 1px 6px;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* ── Progress bar on card ── */
    .track-progress {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }

    .track-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s;
      width: 0%;
    }
  </style>
</head>
<body>

<div id="status-banner"><span class="spinner" style="border-top-color:#ffcc44"></span><span id="status-text"></span></div>
<aside id="create-panel" style="position:relative">
  <div class="logo">▶ RezStation</div>

  <div class="mode-toggle">
    <button class="active" onclick="setMode('simple')">Simple</button>
    <button onclick="setMode('custom')">Custom</button>
  </div>

  <div id="simple-form">
    <div class="field">
      <label>Describe your song <span class="tip" data-tip="A short vibe description. The 4B LM expands this into a full caption, picks BPM/key/structure, and drafts lyrics. Best for exploring — just describe the mood and instruments.">ⓘ</span></label>
      <textarea id="simple-prompt" rows="6" placeholder="An upbeat lo-fi hip hop track with jazzy chords, soft piano, and vinyl crackle..."></textarea>
    </div>
  </div>

  <div id="custom-form">
    <div class="field">
      <label>Description / Caption <span class="tip" data-tip="Your detailed musical description. With LM enhance OFF, this goes straight to the diffusion model — be specific about instruments, mood, arrangement.">ⓘ</span></label>
      <textarea id="custom-caption" rows="4" placeholder="A driving lo-fi hip hop track with jazzy Rhodes piano, dusty drums, and warm vinyl crackle..."></textarea>
    </div>
    <div class="field">
      <label>Tags <span class="tip" data-tip="Comma-separated style/instrument keywords. Appended to the Description above before sending. Good for sharpening genre cues.">ⓘ</span></label>
      <input type="text" id="custom-tags" placeholder="piano, vinyl crackle, soft drums">
    </div>
    <div class="field">
      <label>Lyrics <span class="tip" data-tip="Use [Verse], [Chorus], [Bridge] brackets to give the model structural anchors. Leave empty for instrumental (auto-detected). Lyrics also work as structure hints even on instrumentals.">ⓘ</span></label>
      <textarea id="custom-lyrics" rows="5" placeholder="[Verse 1]&#10;Your lyrics here..."></textarea>
    </div>
    <div class="duration-row">
      <label>Duration: <span id="duration-val">60</span>s <span class="tip" data-tip="Output length in seconds. Longer durations need more diffusion steps and VRAM to stay coherent.">ⓘ</span></label>
      <input type="range" id="custom-duration" min="15" max="240" value="60"
             oninput="document.getElementById('duration-val').textContent = this.value">
      <div class="duration-label"><span>15s</span><span>240s</span></div>
    </div>
    <div class="row">
      <div class="field">
        <label>BPM <span class="tip" data-tip="Tempo in beats per minute. Leave blank to let the model choose based on the description.">ⓘ</span></label>
        <input type="number" id="custom-bpm" placeholder="auto" min="40" max="300">
      </div>
      <div class="field">
        <label>Key <span class="tip" data-tip="Musical key (e.g. 'C major', 'A minor', 'F# dorian'). Leave blank for auto.">ⓘ</span></label>
        <input type="text" id="custom-key" placeholder="auto (e.g. C major)">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Time signature <span class="tip" data-tip="Beats per measure. 4/4 = pop/rock/most music. 3/4 = waltz. 6/8 = ballads, shuffle.">ⓘ</span></label>
        <select id="custom-timesig">
          <option value="">auto</option>
          <option value="3">3/4</option>
          <option value="4" selected>4/4</option>
          <option value="6">6/8</option>
        </select>
      </div>
      <div class="field">
        <label>Vocal language <span class="tip" data-tip="Language for any vocals. Match this to the language your lyrics are written in.">ⓘ</span></label>
        <select id="custom-language">
          <option value="en" selected>English</option>
          <option value="es">Spanish</option>
          <option value="zh">Chinese</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="pt">Portuguese</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Steps <span class="tip" data-tip="Diffusion sampling steps. 8 = draft. 50 = recommended. 70–100 = extra polish. Above 100 hits diminishing returns. More steps = slower but cleaner.">ⓘ</span></label>
        <input type="number" id="custom-steps" value="50" min="8" max="200">
      </div>
      <div class="field">
        <label>Format <span class="tip" data-tip="WAV = uncompressed lossless. FLAC = lossless compressed. MP3 = small lossy. WAV is best for editing later.">ⓘ</span></label>
        <select id="custom-format">
          <option value="wav" selected>WAV</option>
          <option value="flac">FLAC</option>
          <option value="mp3">MP3</option>
        </select>
      </div>
    </div>
    <div class="toggle-row">
      <span>Wide Stereo <span class="tip" data-tip="Appends 'wide stereo' to your prompt, biasing the model toward a roomier, more spread-out mix.">ⓘ</span></span>
      <label class="switch">
        <input type="checkbox" id="custom-stereo">
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <span>Use LM to enhance prompt <span class="tip wide" data-tip="OFF (default): your Caption + Tags go straight to the diffusion model — tight control, faithful to what you wrote. ON: the 4B LM rewrites your prompt with its own caption, BPM, key, and structure — useful for vague prompts but can override your choices. Rule of thumb: more fields you've filled in, the more you want this OFF.">ⓘ</span></span>
      <label class="switch">
        <input type="checkbox" id="custom-thinking">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <button class="btn-generate" id="btn-generate" onclick="generate()">Generate</button>
</aside>

<main id="library-panel">
  <div class="library-header-row">
    <input type="checkbox" class="track-checkbox" id="select-all" title="Select all" onchange="toggleSelectAll(this.checked)">
    <span class="library-header">Library</span>
    <span id="selection-count"></span>
    <button class="btn-mass-menu" onclick="openMassMenu(this)" title="Actions on selected">⋯</button>
  </div>
  <div id="track-list"></div>
  <div id="trash-section" style="display:none">
    <div class="trash-divider">
      <span>🗑 Trash</span>
      <span id="trash-count" style="color:var(--text-muted)"></span>
      <button class="btn-empty-trash" onclick="emptyTrash()">Empty Trash</button>
    </div>
    <div id="trash-list"></div>
  </div>
</main>

<footer id="player-bar">
  <button id="player-play" onclick="togglePlay()">▶</button>
  <div id="player-title" style="color:var(--text-muted)">No track loaded</div>
  <div id="waveform"></div>
  <div id="player-time">0:00 / 0:00</div>
</footer>

<script>
  let currentMode = 'simple';
  let isGenerating = false;
  let currentTrack = null;

  const wavesurfer = WaveSurfer.create({
    container: '#waveform',
    waveColor: '#444',
    progressColor: '#00e5ff',
    height: 48,
    barWidth: 2,
    barGap: 1,
    barRadius: 2,
    interact: true,
    hideScrollbar: true,
  });

  wavesurfer.on('timeupdate', (t) => {
    document.getElementById('player-time').textContent =
      `${fmt(t)} / ${fmt(wavesurfer.getDuration())}`;
  });

  wavesurfer.on('finish', () => {
    document.getElementById('player-play').textContent = '▶';
  });

  function fmt(s) {
    s = Math.floor(s || 0);
    return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
  }

  function setMode(mode) {
    currentMode = mode;
    document.getElementById('simple-form').style.display = mode === 'simple' ? 'flex' : 'none';
    document.getElementById('custom-form').style.display = mode === 'custom' ? 'flex' : 'none';
    document.querySelectorAll('.mode-toggle button').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && mode === 'simple') || (i === 1 && mode === 'custom'));
    });
  }

  function togglePlay() {
    if (!wavesurfer.getDuration()) return;
    wavesurfer.playPause();
    document.getElementById('player-play').textContent = wavesurfer.isPlaying() ? '⏸' : '▶';
  }

  function loadTrack(track) {
    currentTrack = track;
    document.getElementById('player-title').textContent = (track.prompt || 'Untitled').slice(0, 60);
    document.getElementById('player-play').textContent = '▶';
    wavesurfer.load('/audio/' + track.audio_file);
    wavesurfer.once('ready', () => {
      wavesurfer.play();
      document.getElementById('player-play').textContent = '⏸';
    });
    document.querySelectorAll('.track-card').forEach(c => c.classList.remove('active'));
    document.querySelector(`[data-id="${track.id}"]`)?.classList.add('active');
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function download(filename, format) {
    const a = document.createElement('a');
    const stem = filename.replace(/\.[^.]+$/, '');
    const ext = format || filename.split('.').pop();
    a.href = format ? `/audio/${filename}?format=${format}` : '/audio/' + filename;
    a.download = `${stem}.${ext}`;
    a.click();
  }

  function closeMenu() {
    document.querySelectorAll('.track-menu').forEach(m => m.remove());
  }

  function openMenu(trackId, btn, inTrash = false) {
    closeMenu();
    const track = window.__tracks[trackId];
    if (!track) return;
    const menu = document.createElement('div');
    menu.className = 'track-menu';
    if (inTrash) {
      menu.innerHTML = `
        <button onclick="restoreTrack('${trackId}'); closeMenu();">↩ Restore</button>
        <button class="danger" onclick="permanentDelete('${trackId}'); closeMenu();">✕ Delete Forever</button>
      `;
    } else {
      menu.innerHTML = `
        <button onclick="download('${escHtml(track.audio_file)}', 'mp3'); closeMenu();">⬇ Download MP3</button>
        <button onclick="download('${escHtml(track.audio_file)}', 'wav'); closeMenu();">⬇ Download WAV</button>
        <button onclick="download('${escHtml(track.audio_file)}', 'flac'); closeMenu();">⬇ Download FLAC</button>
        <button onclick="copyPrompt('${trackId}'); closeMenu();">📋 Copy prompt</button>
        <button onclick="renameTrack('${trackId}'); closeMenu();">✎ Rename</button>
        <button class="danger" onclick="trashTrack('${trackId}'); closeMenu();">🗑 Move to Trash</button>
      `;
    }
    document.body.appendChild(menu);
    const rect = btn.getBoundingClientRect();
    menu.style.top = `${rect.bottom + 4}px`;
    menu.style.left = `${Math.min(rect.right - menu.offsetWidth, window.innerWidth - menu.offsetWidth - 8)}px`;
    setTimeout(() => document.addEventListener('click', closeMenu, { once: true }), 0);
  }

  function copyPrompt(trackId) {
    const t = window.__tracks[trackId];
    if (t) navigator.clipboard.writeText(t.prompt || '');
  }

  async function renameTrack(trackId) {
    const t = window.__tracks[trackId];
    if (!t) return;
    const next = prompt('Rename track:', t.prompt || '');
    if (next == null || next === t.prompt) return;
    const res = await fetch(`/api/track/${trackId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: next }),
    });
    if (!res.ok) return alert('Rename failed');
    t.prompt = next;
    const card = document.querySelector(`[data-id="${trackId}"] .track-title`);
    if (card) card.textContent = next.slice(0, 80);
    if (currentTrack?.id === trackId) document.getElementById('player-title').textContent = next.slice(0, 60);
  }

  async function trashTrack(trackId) {
    const res = await fetch(`/api/track/${trackId}`, { method: 'DELETE' });
    if (!res.ok) return alert('Failed to move to trash');
    const track = window.__tracks[trackId];
    if (track) { track.trashed = true; }
    document.querySelector(`#track-list [data-id="${trackId}"]`)?.remove();
    renderTrashCard(window.__tracks[trackId]);
    updateTrashVisibility();
    if (currentTrack?.id === trackId) {
      wavesurfer.empty();
      currentTrack = null;
      document.getElementById('player-title').textContent = 'No track loaded';
    }
  }

  async function restoreTrack(trackId) {
    const res = await fetch(`/api/track/${trackId}/restore`, { method: 'POST' });
    if (!res.ok) return alert('Restore failed');
    const track = window.__tracks[trackId];
    if (track) { delete track.trashed; }
    document.querySelector(`#trash-list [data-id="${trackId}"]`)?.remove();
    renderTrack(track, true);
    updateTrashVisibility();
  }

  async function permanentDelete(trackId) {
    if (!confirm('Delete forever? This cannot be undone.')) return;
    const res = await fetch(`/api/track/${trackId}/permanent`, { method: 'DELETE' });
    if (!res.ok) return alert('Delete failed');
    delete window.__tracks[trackId];
    document.querySelector(`#trash-list [data-id="${trackId}"]`)?.remove();
    updateTrashVisibility();
  }

  async function emptyTrash() {
    const count = document.querySelectorAll('#trash-list .track-card').length;
    if (!count) return;
    if (!confirm(`Permanently delete all ${count} trashed track${count !== 1 ? 's' : ''}? This cannot be undone.`)) return;
    const res = await fetch('/api/trash', { method: 'DELETE' });
    if (!res.ok) return alert('Empty trash failed');
    document.getElementById('trash-list').innerHTML = '';
    updateTrashVisibility();
  }

  function updateTrashVisibility() {
    const trashList = document.getElementById('trash-list');
    const section = document.getElementById('trash-section');
    const count = trashList.querySelectorAll('.track-card').length;
    section.style.display = count ? 'block' : 'none';
    document.getElementById('trash-count').textContent = count ? `(${count})` : '';
  }

  function renderTrashCard(track) {
    if (!track) return;
    const list = document.getElementById('trash-list');
    const card = document.createElement('div');
    card.className = 'track-card';
    card.dataset.id = track.id;
    card.onclick = () => loadTrack(track);
    const title = escHtml((track.prompt || 'Untitled').slice(0, 80));
    const dur = track.duration ? fmt(track.duration) : '?';
    card.innerHTML = `
      <button class="play-btn" onclick="event.stopPropagation(); loadTrack(window.__tracks['${track.id}'])">▶</button>
      <div class="track-info">
        <div class="track-title" style="color:var(--text-muted)">${title}</div>
        <div class="track-meta">In Trash</div>
      </div>
      <div class="track-duration">${dur}</div>
      <button class="btn-menu" onclick="event.stopPropagation(); openMenu('${track.id}', this, true)">⋯</button>
    `;
    list.appendChild(card);
    updateTrashVisibility();
  }

  function renderTrack(track, prepend = false) {
    const list = document.getElementById('track-list');
    const card = document.createElement('div');
    card.className = 'track-card' + (track.generating ? ' generating' : '');
    card.dataset.id = track.id;
    if (!track.generating) card.onclick = () => loadTrack(track);

    const dur = track.duration ? fmt(track.duration) : (track.generating ? '' : '?');
    const isRecovered = track.mode === 'recovered';
    const meta = isRecovered ? 'Recovered' : (track.params?.lyrics ? 'Custom mode' : 'Simple mode');
    const recoveredBadge = isRecovered ? '<span class="badge-recovered">recovered</span>' : '';
    const title = escHtml((track.prompt || 'Generating...').slice(0, 80));

    card.innerHTML = `
      ${track.generating ? '<div style="width:17px;flex-shrink:0"></div>' : `<input type="checkbox" class="track-checkbox" data-check="${track.id}" onclick="event.stopPropagation(); toggleSelect('${track.id}', this)">`}
      <button class="play-btn" ${track.generating ? 'disabled' : `onclick="event.stopPropagation(); loadTrack(window.__tracks['${track.id}'])"`}>
        ${track.generating ? '<span class="spinner"></span>' : '▶'}
      </button>
      <div class="track-info">
        <div class="track-title">${title}${recoveredBadge}</div>
        <div class="track-meta track-status">${track.generating ? 'Starting...' : meta}</div>
        ${track.generating ? '<div class="track-progress"><div class="track-progress-fill"></div></div>' : ''}
      </div>
      <div class="track-duration">${dur}</div>
      ${track.generating ? '' : `<button class="btn-menu" onclick="event.stopPropagation(); openMenu('${track.id}', this)">⋯</button>`}
    `;

    window.__tracks = window.__tracks || {};
    window.__tracks[track.id] = track;

    if (prepend) list.prepend(card);
    else list.appendChild(card);
    return card;
  }

  function updateCard(card, message, progress) {
    const statusEl = card.querySelector('.track-status');
    if (statusEl) statusEl.textContent = message;
    const fill = card.querySelector('.track-progress-fill');
    if (fill && progress != null) fill.style.width = `${Math.round(progress * 100)}%`;
  }

  // ── Status banner (model load state) ──
  async function checkStatus() {
    try {
      const res = await fetch('/api/status');
      const data = await res.json();
      const d = data.data || data;
      const banner = document.getElementById('status-banner');
      const text = document.getElementById('status-text');
      if (d.status === 'unreachable') {
        text.textContent = 'ACE-Step engine is not running on port 8001';
        banner.classList.add('visible');
      } else if (!d.models_initialized) {
        text.textContent = 'Models not loaded — first generation will trigger download & load (~1–2 min)';
        banner.classList.add('visible');
        // Re-check every 10s until loaded
        setTimeout(async () => {
          const r2 = await fetch('/api/status');
          const d2 = (await r2.json()).data || (await r2.json());
          if (d2.models_initialized) banner.classList.remove('visible');
        }, 10000);
      } else {
        banner.classList.remove('visible');
      }
    } catch (e) {
      // server not up yet, ignore
    }
  }

  async function loadHistory() {
    const res = await fetch('/api/history');
    const tracks = await res.json();
    tracks.forEach(t => {
      window.__tracks = window.__tracks || {};
      window.__tracks[t.id] = t;
      if (t.trashed) renderTrashCard(t);
      else renderTrack(t);
    });
    updateTrashVisibility();
  }

  async function generate() {
    if (isGenerating) return;
    isGenerating = true;

    const btn = document.getElementById('btn-generate');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Generating...';

    let payload;
    if (currentMode === 'simple') {
      const prompt = document.getElementById('simple-prompt').value.trim();
      if (!prompt) { resetBtn(); return; }
      payload = {
        sample_query: prompt,
        vocal_language: 'en',
        instrumental: false,
        audio_duration: 30,
        inference_steps: 50,
        audio_format: 'wav',
        _mode: 'simple',
      };
    } else {
      const caption = document.getElementById('custom-caption').value.trim();
      const tags = document.getElementById('custom-tags').value.trim();
      const lyrics = document.getElementById('custom-lyrics').value;
      const wideStereo = document.getElementById('custom-stereo').checked;
      let prompt = [caption, tags].filter(Boolean).join(', ');
      if (wideStereo) prompt += ', wide stereo';
      if (!prompt) { resetBtn(); return; }
      payload = {
        prompt,
        lyrics,
        instrumental: !lyrics.trim(),
        vocal_language: document.getElementById('custom-language').value,
        audio_duration: parseFloat(document.getElementById('custom-duration').value),
        audio_format: document.getElementById('custom-format').value,
        inference_steps: parseInt(document.getElementById('custom-steps').value) || 50,
        thinking: document.getElementById('custom-thinking').checked,
        _mode: 'custom',
      };
      const bpm = document.getElementById('custom-bpm').value;
      if (bpm) payload.bpm = parseInt(bpm);
      const key = document.getElementById('custom-key').value.trim();
      if (key) payload.key_scale = key;
      const timesig = document.getElementById('custom-timesig').value;
      if (timesig) payload.time_signature = timesig;
    }

    // Create placeholder card
    const placeholderId = 'pending-' + Date.now();
    const placeholder = { id: placeholderId, prompt: payload.prompt || payload.sample_query || '', generating: true, params: payload };
    const card = renderTrack(placeholder, true);

    try {
      // POST to enqueue, get job_id
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error(await res.text());
      const { job_id } = await res.json();

      // Open SSE stream
      await new Promise((resolve, reject) => {
        const es = new EventSource(`/api/stream/${job_id}`);

        es.onmessage = (e) => {
          const event = JSON.parse(e.data);
          const { stage, message, progress, track } = event;

          if (stage === 'succeeded' && track) {
            es.close();
            card.remove();
            window.__tracks[track.id] = track;
            renderTrack(track, true);
            loadTrack(track);
            // Hide banner if models now loaded
            document.getElementById('status-banner').classList.remove('visible');
            resolve();
          } else if (stage === 'error') {
            es.close();
            updateCard(card, '⚠ ' + message, null);
            card.classList.remove('generating');
            card.querySelector('.play-btn').innerHTML = '✕';
            reject(new Error(message));
          } else {
            updateCard(card, message, progress);
            // Show banner for download/load stages
            if (stage === 'downloading' || stage === 'loading') {
              const text = document.getElementById('status-text');
              text.textContent = message;
              document.getElementById('status-banner').classList.add('visible');
            }
          }
        };

        es.onerror = () => {
          es.close();
          reject(new Error('SSE connection lost'));
        };
      });
    } catch (e) {
      console.error(e);
    }

    resetBtn();
  }

  function resetBtn() {
    isGenerating = false;
    const btn = document.getElementById('btn-generate');
    btn.disabled = false;
    btn.textContent = 'Generate';
  }

  // ── Selection state ──
  const selectedTracks = new Set();

  function toggleSelect(trackId, cb) {
    if (cb.checked) selectedTracks.add(trackId);
    else selectedTracks.delete(trackId);
    document.querySelector(`[data-id="${trackId}"]`)?.classList.toggle('selected', cb.checked);
    updateSelectionUI();
  }

  function toggleSelectAll(checked) {
    document.querySelectorAll('#track-list .track-card:not(.generating)').forEach(card => {
      const id = card.dataset.id;
      const cb = card.querySelector('.track-checkbox');
      if (!cb) return;
      cb.checked = checked;
      card.classList.toggle('selected', checked);
      if (checked) selectedTracks.add(id);
      else selectedTracks.delete(id);
    });
    updateSelectionUI();
  }

  function updateSelectionUI() {
    const total = document.querySelectorAll('#track-list .track-card:not(.generating)').length;
    const n = selectedTracks.size;
    const countEl = document.getElementById('selection-count');
    countEl.textContent = n > 0 ? `${n} selected` : '';
    const sa = document.getElementById('select-all');
    if (n === 0) { sa.checked = false; sa.indeterminate = false; }
    else if (n === total) { sa.checked = true; sa.indeterminate = false; }
    else { sa.checked = false; sa.indeterminate = true; }
  }

  function openMassMenu(btn) {
    closeMenu();
    const n = selectedTracks.size;
    const label = n > 0 ? `${n} selected` : 'No tracks selected';
    const disabled = n === 0;
    const menu = document.createElement('div');
    menu.className = 'track-menu';
    menu.innerHTML = `
      <div style="padding:6px 12px;font-size:0.78rem;color:var(--text-muted)">${label}</div>
      <div class="mass-menu-sep"></div>
      <button ${disabled ? 'disabled style="opacity:0.4;cursor:default"' : ''} onclick="massDownload('mp3'); closeMenu();">⬇ Download as MP3</button>
      <button ${disabled ? 'disabled style="opacity:0.4;cursor:default"' : ''} onclick="massDownload('wav'); closeMenu();">⬇ Download as WAV</button>
      <button ${disabled ? 'disabled style="opacity:0.4;cursor:default"' : ''} onclick="massDownload('flac'); closeMenu();">⬇ Download as FLAC</button>
      <div class="mass-menu-sep"></div>
      <button class="danger" ${disabled ? 'disabled style="opacity:0.4;cursor:default"' : ''} onclick="massTrash(); closeMenu();">🗑 Move to Trash</button>
    `;
    document.body.appendChild(menu);
    const rect = btn.getBoundingClientRect();
    menu.style.top = `${rect.bottom + 4}px`;
    menu.style.left = `${Math.min(rect.right - menu.offsetWidth, window.innerWidth - menu.offsetWidth - 8)}px`;
    setTimeout(() => document.addEventListener('click', closeMenu, { once: true }), 0);
  }

  async function massDownload(format) {
    if (selectedTracks.size === 0) return;
    const ids = [...selectedTracks];
    for (let i = 0; i < ids.length; i++) {
      const t = window.__tracks[ids[i]];
      if (t) {
        setTimeout(() => download(t.audio_file, format), i * 400);
      }
    }
  }

  async function massTrash() {
    if (selectedTracks.size === 0) return;
    const ids = [...selectedTracks];
    for (const id of ids) {
      const res = await fetch(`/api/track/${id}`, { method: 'DELETE' });
      if (res.ok) {
        const track = window.__tracks[id];
        if (track) { track.trashed = true; }
        document.querySelector(`#track-list [data-id="${id}"]`)?.remove();
        renderTrashCard(window.__tracks[id]);
        selectedTracks.delete(id);
      }
    }
    if (currentTrack && !window.__tracks[currentTrack.id]?.trashed === false) {
      // current track still exists, fine
    }
    updateTrashVisibility();
    updateSelectionUI();
  }

  // Boot
  checkStatus();
  loadHistory();
</script>
</body>
</html>
